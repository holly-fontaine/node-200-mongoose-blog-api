version: 2.1

jobs:
  test:
    docker:
      - image: cimg/node:lts
      - image: mongo:7
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Run tests
          command: npm test

workflows:
  build-and-test:
    jobs:
      - test
